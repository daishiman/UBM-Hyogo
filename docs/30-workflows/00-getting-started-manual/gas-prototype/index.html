<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UBM兵庫支部会 メンバーサイト Prototype</title>
    <style>
      :root {
        --bg: #f4f1ea;
        --panel: rgba(255, 252, 247, 0.82);
        --panel-strong: rgba(255, 252, 247, 0.96);
        --line: rgba(46, 44, 41, 0.12);
        --line-strong: rgba(46, 44, 41, 0.2);
        --text: #1f1d1a;
        --muted: #6d685f;
        --accent: #1f5f55;
        --accent-soft: rgba(31, 95, 85, 0.12);
        --view: #2f6cc6;
        --view-soft: rgba(47, 108, 198, 0.12);
        --warn: #9b6b2f;
        --danger: #8c3d35;
        --shadow: 0 20px 60px rgba(50, 43, 32, 0.08);
        --radius-xl: 28px;
        --radius-lg: 20px;
        --radius-md: 14px;
        --radius-sm: 10px;
        --font:
          "SF Pro Display", "SF Pro Text", "Hiragino Sans", "Yu Gothic",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: var(--font);
        background:
          radial-gradient(circle at top left, rgba(31, 95, 85, 0.11), transparent 32%),
          radial-gradient(circle at top right, rgba(155, 107, 47, 0.12), transparent 28%),
          linear-gradient(180deg, #fbf8f2 0%, #f2eee6 100%);
        color: var(--text);
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        padding: 24px;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
        border: 0;
        transition:
          transform 0.18s ease,
          background-color 0.18s ease,
          border-color 0.18s ease,
          opacity 0.18s ease;
      }

      button:active {
        transform: scale(0.985);
      }

      .shell {
        max-width: 1440px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        gap: 20px;
      }

      .sidebar,
      .content-panel {
        background: var(--panel);
        backdrop-filter: blur(24px);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
      }

      .sidebar {
        border-radius: 30px;
        padding: 20px 18px;
        position: sticky;
        top: 24px;
        align-self: start;
      }

      .brand {
        padding: 10px 10px 18px;
        border-bottom: 1px solid var(--line);
        margin-bottom: 18px;
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .brand h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
        letter-spacing: -0.04em;
      }

      .brand p {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.5;
        font-size: 14px;
      }

      .nav-group {
        display: grid;
        gap: 8px;
      }

      .nav-item {
        width: 100%;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 14px;
        border-radius: 16px;
        background: transparent;
        color: var(--text);
        border: 1px solid transparent;
      }

      .nav-item:hover,
      .nav-item.active {
        background: var(--panel-strong);
        border-color: var(--line);
      }

      .nav-item.active {
        box-shadow: inset 0 0 0 1px rgba(31, 95, 85, 0.08);
      }

      .nav-copy {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .nav-copy strong {
        font-size: 14px;
      }

      .nav-copy span {
        color: var(--muted);
        font-size: 12px;
      }

      .content-panel {
        border-radius: 34px;
        padding: 24px;
        min-height: calc(100vh - 48px);
      }

      .hero {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 18px;
        margin-bottom: 18px;
      }

      .card {
        background: var(--panel-strong);
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        padding: 20px;
      }

      .mode-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 12px;
        line-height: 1;
        font-weight: 600;
        white-space: nowrap;
      }

      .mode-pill.view {
        background: var(--view-soft);
        color: var(--view);
      }

      .mode-pill.edit {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .mode-pill.admin {
        background: rgba(155, 107, 47, 0.12);
        color: var(--warn);
      }

      .surface-view {
        background:
          linear-gradient(180deg, rgba(47, 108, 198, 0.08), rgba(255, 252, 247, 0.98)),
          var(--panel-strong);
        border-color: rgba(47, 108, 198, 0.16);
      }

      .surface-edit {
        background:
          linear-gradient(180deg, rgba(31, 95, 85, 0.09), rgba(255, 252, 247, 0.98)),
          var(--panel-strong);
        border-color: rgba(31, 95, 85, 0.18);
      }

      .surface-admin {
        background:
          linear-gradient(180deg, rgba(155, 107, 47, 0.08), rgba(255, 252, 247, 0.98)),
          var(--panel-strong);
        border-color: rgba(155, 107, 47, 0.16);
      }

      .hero-card {
        padding: 28px;
      }

      .hero-card h2,
      .page-title {
        margin: 0;
        font-size: 42px;
        line-height: 0.96;
        letter-spacing: -0.05em;
      }

      .hero-card p,
      .page-subtitle {
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.65;
        font-size: 15px;
      }

      .hero-actions,
      .toolbar,
      .chip-row,
      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .hero-actions {
        margin-top: 20px;
      }

      .btn-primary,
      .btn-secondary,
      .btn-ghost,
      .btn-danger {
        padding: 11px 16px;
        border-radius: 999px;
        font-size: 14px;
        line-height: 1;
      }

      .btn-primary {
        background: var(--text);
        color: #fffaf4;
      }

      .btn-secondary {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .btn-ghost {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--line-strong);
      }

      .btn-danger {
        background: rgba(140, 61, 53, 0.1);
        color: var(--danger);
      }

      .stats-grid,
      .member-grid,
      .admin-grid,
      .meeting-grid,
      .settings-grid,
      .detail-grid,
      .form-grid {
        display: grid;
        gap: 16px;
      }

      .stats-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        margin-top: 18px;
      }

      .stat {
        padding: 18px;
      }

      .stat-label {
        color: var(--muted);
        font-size: 13px;
      }

      .stat-value {
        margin-top: 8px;
        font-size: 34px;
        letter-spacing: -0.04em;
      }

      .member-grid,
      .admin-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .meeting-grid,
      .settings-grid,
      .detail-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .section {
        display: none;
        animation: rise 0.35s ease;
      }

      .section.active {
        display: block;
      }

      .section-anchor {
        scroll-margin-top: 18px;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 18px;
      }

      .member-card,
      .admin-row,
      .meeting-card,
      .schema-card,
      .detail-card {
        padding: 18px;
      }

      .member-card h3,
      .detail-card h3,
      .meeting-card h3,
      .schema-card h3 {
        margin: 0;
        font-size: 22px;
        letter-spacing: -0.03em;
      }

      .member-meta,
      .small-copy {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 12px;
        background: #f2ede5;
        color: #3b372f;
        border: 1px solid rgba(59, 55, 47, 0.08);
      }

      .chip.highlight {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .chip.warn {
        background: rgba(155, 107, 47, 0.12);
        color: var(--warn);
      }

      .chip.danger {
        background: rgba(140, 61, 53, 0.12);
        color: var(--danger);
      }

      .section-nav {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 4px;
      }

      .section-nav .chip {
        white-space: nowrap;
      }

      .search-shell,
      .field,
      .textarea,
      .select {
        width: 100%;
        border: 1px solid var(--line-strong);
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        border-radius: 16px;
        padding: 14px 16px;
        outline: none;
      }

      .search-shell:focus,
      .field:focus,
      .textarea:focus,
      .select:focus {
        border-color: rgba(31, 95, 85, 0.3);
        box-shadow: 0 0 0 4px rgba(31, 95, 85, 0.08);
      }

      .textarea {
        min-height: 120px;
        resize: vertical;
      }

      .filter-bar {
        display: grid;
        grid-template-columns: 1.4fr 0.7fr 0.7fr;
        gap: 12px;
        margin-bottom: 18px;
      }

      .page-stack {
        display: grid;
        gap: 18px;
      }

      .split-panel {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 18px;
      }

      .profile-hero {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
      }

      .avatar {
        width: 62px;
        height: 62px;
        border-radius: 22px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #1f5f55, #3d8c80);
        color: white;
        font-size: 22px;
        font-weight: 700;
      }

      .profile-title {
        display: flex;
        gap: 16px;
      }

      .kv {
        display: grid;
        gap: 14px;
      }

      .kv-item {
        padding: 16px 0;
        border-bottom: 1px solid var(--line);
      }

      .kv-item:last-child {
        border-bottom: 0;
      }

      .kv-label {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .kv-value {
        margin-top: 6px;
        line-height: 1.7;
      }

      .inline-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .attendance-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 14px;
      }

      .attendance-item,
      .admin-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
      }

      .admin-row {
        padding: 16px 18px;
      }

      .toggle {
        position: relative;
        width: 58px;
        height: 34px;
        border-radius: 999px;
        background: #d3ccc0;
      }

      .toggle.active {
        background: #3f8277;
      }

      .toggle::after {
        content: "";
        position: absolute;
        top: 4px;
        left: 4px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: white;
        transition: transform 0.18s ease;
      }

      .toggle.active::after {
        transform: translateX(24px);
      }

      .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field-wrap {
        display: grid;
        gap: 8px;
      }

      .field-wrap.full {
        grid-column: 1 / -1;
      }

      label {
        font-size: 13px;
        color: var(--muted);
      }

      .footer-note {
        color: var(--muted);
        font-size: 12px;
        margin-top: 14px;
      }

      .icon {
        width: 18px;
        height: 18px;
        flex: 0 0 18px;
      }

      .empty {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted);
      }

      @media (max-width: 1120px) {
        .shell,
        .hero,
        .split-panel,
        .member-grid,
        .admin-grid,
        .meeting-grid,
        .settings-grid,
        .detail-grid,
        .stats-grid,
        .filter-bar,
        .form-grid {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
        }
      }

      @media (max-width: 720px) {
        body {
          padding: 14px;
        }

        .shell {
          gap: 14px;
        }

        .sidebar {
          padding: 16px 14px;
          border-radius: 24px;
        }

        .brand {
          padding: 6px 6px 14px;
          margin-bottom: 14px;
        }

        .brand h1 {
          font-size: 22px;
        }

        .nav-group {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .nav-item {
          padding: 12px;
          align-items: flex-start;
        }

        .nav-copy span {
          display: none;
        }

        .content-panel {
          padding: 16px;
          min-height: auto;
          border-radius: 28px;
        }

        .hero-card,
        .card {
          padding: 18px;
        }

        .hero-card h2,
        .page-title {
          font-size: 32px;
        }

        .section-header,
        .profile-hero,
        .attendance-item,
        .admin-row {
          flex-direction: column;
          align-items: stretch;
        }

        .section-header {
          gap: 12px;
        }

        .button-row,
        .hero-actions {
          width: 100%;
        }

        .button-row > button,
        .hero-actions > button {
          flex: 1 1 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="eyebrow">UBM Hyogo branch</div>
          <h1>Member site prototype</h1>
          <p>
            認証なしの叩き台です。管理操作、開催日追加、参加履歴付与、
            プロフィール編集の操作感をここで確認できます。
          </p>
        </div>
        <nav class="nav-group" id="nav"></nav>
      </aside>

      <main class="content-panel">
        <section class="section active" id="view-overview"></section>
        <section class="section" id="view-members"></section>
        <section class="section" id="view-detail"></section>
        <section class="section" id="view-user-detail"></section>
        <section class="section" id="view-admin-members"></section>
        <section class="section" id="view-admin-meetings"></section>
        <section class="section" id="view-tags"></section>
        <section class="section" id="view-settings"></section>
      </main>
    </div>

    <script>
      const STORAGE_KEY = "ubm-gas-prototype-state-v1";

      const navItems = [
        { id: "overview", label: "Overview", note: "全体サマリー", icon: "layout" },
        { id: "members", label: "Members", note: "一覧と検索", icon: "users" },
        { id: "detail", label: "My Profile", note: "本人編集", icon: "user" },
        { id: "user-detail", label: "Profile View", note: "閲覧専用", icon: "eye" },
        { id: "admin-members", label: "Admin Members", note: "表示と参加日", icon: "shield" },
        { id: "admin-meetings", label: "Admin Meetings", note: "開催日追加", icon: "calendar" },
        { id: "tags", label: "Tags", note: "業種タグとAI", icon: "tag" },
        { id: "settings", label: "Schema", note: "スキーマと設定", icon: "settings" }
      ];

      const tagCatalog = [
        {
          category: "ビジネス・経営",
          tags: [
            { label: "経営者・代表", keywords: ["代表", "社長", "経営者", "CEO", "起業"] },
            { label: "事業開発", keywords: ["事業開発", "新規事業", "事業推進", "営業企画"] },
            { label: "経営戦略", keywords: ["戦略", "経営", "事業再編", "経営企画"] },
            { label: "人事・採用", keywords: ["採用", "人事", "組織", "面接"] },
            { label: "財務・会計", keywords: ["会計", "財務", "税務", "資金繰り"] }
          ]
        },
        {
          category: "IT・テクノロジー",
          tags: [
            { label: "エンジニア", keywords: ["エンジニア", "開発", "フロント", "バックエンド"] },
            { label: "Web・IT", keywords: ["Web", "IT", "システム", "SaaS"] },
            { label: "DX推進", keywords: ["DX", "業務改善", "自動化", "効率化"] },
            { label: "AI・データ", keywords: ["AI", "生成AI", "データ", "分析"] },
            { label: "UI/UX", keywords: ["UI", "UX", "導線", "体験設計"] }
          ]
        },
        {
          category: "クリエイティブ",
          tags: [
            { label: "デザイン", keywords: ["デザイン", "ブランド", "ビジュアル"] },
            { label: "動画・映像", keywords: ["動画", "映像", "撮影", "編集"] },
            { label: "写真", keywords: ["写真", "撮影", "カメラ"] },
            { label: "コンテンツ制作", keywords: ["コンテンツ", "記事", "制作", "編集"] },
            { label: "ライター・編集", keywords: ["ライター", "編集", "文章"] }
          ]
        },
        {
          category: "マーケティング・販売",
          tags: [
            { label: "マーケティング", keywords: ["マーケティング", "集客", "販促"] },
            { label: "SNS運用", keywords: ["SNS", "Instagram", "X運用", "投稿"] },
            { label: "ブランディング", keywords: ["ブランディング", "ブランド", "認知"] },
            { label: "営業・販売", keywords: ["営業", "販売", "提案", "商談"] },
            { label: "広告運用", keywords: ["広告", "運用", "リード", "CPA"] }
          ]
        },
        {
          category: "専門職",
          tags: [
            { label: "士業", keywords: ["士業", "弁護士", "税理士", "社労士"] },
            { label: "医療・福祉", keywords: ["医療", "福祉", "介護", "看護"] },
            { label: "教育・コーチング", keywords: ["教育", "研修", "コーチ", "講師"] },
            { label: "金融・保険", keywords: ["金融", "保険", "資産", "投資"] },
            { label: "研究・学術", keywords: ["研究", "学術", "大学", "研究開発"] }
          ]
        },
        {
          category: "ライフスタイル",
          tags: [
            { label: "飲食・食品", keywords: ["飲食", "食品", "カフェ", "レストラン"] },
            { label: "美容・健康", keywords: ["美容", "健康", "サロン", "フィットネス"] },
            { label: "不動産", keywords: ["不動産", "賃貸", "土地", "建物"] },
            { label: "旅行・観光", keywords: ["旅行", "観光", "宿泊", "ツアー"] },
            { label: "製造業", keywords: ["製造", "工場", "生産", "ものづくり"] }
          ]
        }
      ];

      const surveySections = [
        {
          key: "basic_profile",
          label: "基本プロフィール",
          note: "公開プロフィールの基礎情報",
          fields: [
            { key: "fullName", label: "お名前（フルネーム）", kind: "shortText", editor: "text", required: true, visibility: "public" },
            { key: "nickname", label: "あだ名・ニックネーム", kind: "shortText", editor: "text", required: false, visibility: "public" },
            { key: "location", label: "お住まい（都道府県・市区町村）", kind: "shortText", editor: "text", required: true, visibility: "public" },
            { key: "birthDate", label: "生年月日", kind: "date", editor: "date", required: false, visibility: "member" },
            { key: "occupation", label: "職業・仕事内容", kind: "shortText", editor: "text", required: true, visibility: "public" },
            { key: "hometown", label: "出身地", kind: "shortText", editor: "text", required: false, visibility: "public" }
          ]
        },
        {
          key: "ubm_profile",
          label: "UBM情報",
          note: "会区画と参加経緯",
          fields: [
            { key: "ubmZone", label: "UBM区画", kind: "radio", editor: "select", required: true, visibility: "public", options: ["0→1", "1→10", "10→100"] },
            { key: "ubmMembershipType", label: "UBM参加ステータス", kind: "radio", editor: "select", required: true, visibility: "public", options: ["会員", "非会員", "アカデミー生"] },
            { key: "ubmJoinDate", label: "UBMに入会・参加した時期", kind: "shortText", editor: "text", required: false, visibility: "member" },
            { key: "businessOverview", label: "ビジネス概要", kind: "paragraph", editor: "textarea", required: true, visibility: "public" },

      function loadState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return structuredClone(initialState);
        try {
          const parsed = JSON.parse(raw);
          const parsedMembers = Array.isArray(parsed.members) ? parsed.members : [];
          const mergedMembers = initialState.members.map((base) => {
            const saved = parsedMembers.find((member) => member.id === base.id);
            return saved ? { ...structuredClone(base), ...saved } : structuredClone(base);
          });
          parsedMembers
            .filter((member) => !initialState.members.some((base) => base.id === member.id))
            .forEach((member) => {
              mergedMembers.push(member);
            });
          return {
            ...structuredClone(initialState),
            ...parsed,
            currentUserId: parsed.currentUserId || initialState.currentUserId,
            selectedMemberId: parsed.selectedMemberId || initialState.selectedMemberId,
            filters: {
              ...structuredClone(initialState.filters),
              ...(parsed.filters || {})
            },
            meetings:
              Array.isArray(parsed.meetings) && parsed.meetings.length
                ? parsed.meetings
                : structuredClone(initialState.meetings),
            schemaFields:
              Array.isArray(parsed.schemaFields) && parsed.schemaFields.length
                ? parsed.schemaFields
                : structuredClone(initialState.schemaFields),
            members: mergedMembers
          };
        } catch (error) {
          return structuredClone(initialState);
        }
      }

      let state = loadState();

      function getFieldValue(member, key) {
        const value = member[key];
        return value === undefined || value === null ? "" : value;
      }

      function shortenUrl(value) {
        if (!value) return "";
        try {
          const parsed = new URL(value);
          return parsed.hostname.replace(/^www\./, "");
        } catch (error) {
          return String(value);
        }
      }

      function isSelfProfile(member) {
        return member.id === state.currentUserId;

      function renderFieldDisplay(field, member) {
        const value = String(getFieldValue(member, field.key)).trim();
        if (!value) {
          return '<span class="chip warn">未入力</span>';
        }

        if (field.kind === "date") {
          return `<div class="kv-value">${escapeHtml(formatDate(value))}</div>`;
        }

        if (field.kind === "url") {
          return `<a class="chip highlight" style="text-decoration:none;" href="${escapeHtml(value)}" target="_blank" rel="noreferrer">${escapeHtml(shortenUrl(value))}</a>`;
        }

        if (field.kind === "radio") {
          return `<span class="chip highlight">${escapeHtml(value)}</span>`;
        }

        if (field.kind === "paragraph") {
          return `<div class="kv-value" style="white-space: pre-wrap;">${escapeHtml(value)}</div>`;
        }

        return `<div class="kv-value">${escapeHtml(value)}</div>`;
      }

      function renderFieldEditor(field, member) {
        const value = escapeHtml(getFieldValue(member, field.key));
        const inputName = field.key;
        const requiredAttr = field.required ? "required" : "";

        if (field.kind === "paragraph") {
          return `
            <textarea class="textarea" name="${inputName}" placeholder="${escapeHtml(field.label)}" ${requiredAttr}>${value}</textarea>
          `;
        }

        if (field.kind === "date") {
          return `<input class="field" type="date" name="${inputName}" value="${value}" ${requiredAttr} />`;
        }

        if (field.kind === "url") {
          return `<input class="field" type="url" name="${inputName}" value="${value}" placeholder="https://example.com" ${requiredAttr} />`;
        }

        if (field.kind === "radio") {
          return `
            <select class="select" name="${inputName}" ${requiredAttr}>
              ${(field.options || [])
                .map(
                  (option) =>
                    `<option value="${escapeHtml(option)}" ${String(getFieldValue(member, field.key)) === option ? "selected" : ""}>${escapeHtml(option)}</option>`
                )
                .join("")}
            </select>
          `;
        }

        return `<input class="field" type="text" name="${inputName}" value="${value}" placeholder="${escapeHtml(field.label)}" ${requiredAttr} />`;
      }

          member.ubmMembershipType,
          member.ubmJoinDate,
          member.businessOverview,
          member.skills,
          member.canProvide,
          member.challenges,
          member.hobbies,
          member.recentInterest,
          member.motto,
          member.otherActivities,
          member.selfIntroduction
        ]
          .join(" ")
          .toLowerCase();

        const scores = [];
        tagCatalog.forEach((group) => {
          group.tags.forEach((tag) => {
            let score = 0;
            let evidence = [];
            tag.keywords.forEach((keyword) => {
              if (corpus.includes(keyword.toLowerCase())) {
                score += 1;
                evidence.push(keyword);
              }
            });
            if (score > 0) {
              if (member.occupation.toLowerCase().includes(tag.label.toLowerCase())) {
                score += 1;
              }
              scores.push({
                category: group.category,
                label: tag.label,
                score,
                evidence: evidence.slice(0, 2).join(" / ")
              });
            }
          });
        });

        return scores
          .sort((a, b) => b.score - a.score || a.label.localeCompare(b.label, "ja"))
          .slice(0, 8);
      }

      function applyTagSuggestions(memberId) {
        const member = findMember(memberId);
        const suggestions = inferTags(member).map((item) => item.label);
        member.tags = [...new Set(suggestions.slice(0, 5).concat(member.tags || []))].slice(0, 6);
        member.tagSource = "gemini-lite";

        render();

      function formatDate(date) {
        const value = new Date(date);
        if (Number.isNaN(value.getTime())) return date;
        return value.toLocaleDateString("ja-JP", {
          year: "numeric",
          month: "long",
          day: "numeric"
        });
      }

      function filteredMembers() {
        return state.members.filter((member) => {
          const keyword = state.filters.keyword.trim().toLowerCase();
          const phaseOk =
            state.filters.phase === "all" || member.ubmPhase === state.filters.phase;
          const visibilityOk =
            state.filters.visibility === "all" ||
            (state.filters.visibility === "visible" && member.visible) ||
            (state.filters.visibility === "hidden" && !member.visible);
          const tagOk =
            state.filters.tag === "all" ||
            (member.tags || []).includes(state.filters.tag);
          const keywordOk =
            !keyword ||
            [
              member.fullName,
              member.nickname,
              member.location,
              member.occupation,
              member.businessOverview,
              member.skills,
              member.canProvide,
              member.challenges,
              member.hobbies,
              member.recentInterest,
              member.motto,
              member.otherActivities,
              member.selfIntroduction,
              member.urlWebsite,
              member.urlBlog,
              member.urlNote
              ]
              .join(" ")
              .toLowerCase()
              .includes(keyword);
          return phaseOk && visibilityOk && tagOk && keywordOk;
        });
      }

        const member = findMember(memberId);
        member.visible = !member.visible;

        render();

      function toggleAttendance(memberId, meetingId) {
        const member = findMember(memberId);
        const exists = member.attendance.includes(meetingId);
        member.attendance = exists
          ? member.attendance.filter((id) => id !== meetingId)
          : [...member.attendance, meetingId];
        member.updatedAt = new Date().toLocaleString("ja-JP");
        saveState();
        render();
      }

      function addMeeting(form) {
        const date = form.querySelector('[name="meetingDate"]').value;
        const label = form.querySelector('[name="meetingLabel"]').value.trim();
        const note = form.querySelector('[name="meetingNote"]').value.trim();
        if (!date || !label) return;
        state.meetings.unshift({
          id: "meet-" + Date.now(),
          date,
          label,
          note
        });
        saveState();
        render();
        form.reset();
      }

      function saveProfile(form) {
        const member = findMember(state.selectedMemberId);
        const formData = new FormData(form);
        profileEditableFieldKeys().forEach((key) => {
          if (!formData.has(key)) return;
          member[key] = String(formData.get(key) ?? "").trim();
        });
        member.updatedAt = new Date().toLocaleString("ja-JP");
        saveState();
        render();
      }

          .map(
            (section) =>
              `<a class="chip highlight" style="text-decoration:none;" href="#schema-${section.key}">${escapeHtml(section.label)}</a>`

                                  <div class="small-copy">${escapeHtml(field.key)} ・ ${escapeHtml(field.kind)} ・ ${escapeHtml(field.visibility)}${field.options && field.options.length ? " ・ " + escapeHtml(field.options.join(" / ")) : ""}</div>

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

        renderNav();
        renderOverview();
        renderMembers();
        renderDetail();
        renderUserDetail();
        renderAdminMembers();
        renderAdminMeetings();
        renderTags();
        renderSettings();

        document.querySelectorAll(".section").forEach((section) => {
          section.classList.toggle("active", section.id === "view-" + state.currentView);
        });

        bindEvents();
      }

      render();
