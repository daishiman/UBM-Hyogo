# 目的: apps/api の test + coverage を CI で実行（08a 成果物）
# 範囲: PR / push (main, dev) で apps/api 配下の vitest suite を回し、coverage を artifact 化する
# 配置先（本番反映時）: .github/workflows/api-tests.yml
# Node 24 / pnpm 10 を mise pin と整合させる
name: api-tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/api-tests.yml'

concurrency:
  group: api-tests-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: api-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run apps/api vitest suite
        run: pnpm --filter @ubm-hyogo/api test

      - name: Run apps/api coverage
        run: pnpm --filter @ubm-hyogo/api test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: apps/api/coverage/
          if-no-files-found: warn
          retention-days: 14
