<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CF Audit Log 7day Trend</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18202a;
      --muted: #627080;
      --line: #d7dee6;
      --panel: #ffffff;
      --bg: #f5f7f9;
      --blue: #2563eb;
      --green: #16875d;
      --red: #c2410c;
      --gold: #a16207;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header, main { max-width: 1180px; margin: 0 auto; padding: 24px; }
    header { display: flex; align-items: end; justify-content: space-between; gap: 20px; }
    h1 { margin: 0; font-size: 28px; line-height: 1.15; }
    .meta { color: var(--muted); font-size: 13px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
    .toolbar a {
      color: var(--ink);
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 6px;
      padding: 7px 10px;
      text-decoration: none;
      font-size: 13px;
    }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-height: 310px;
    }
    section:target { outline: 3px solid #93c5fd; outline-offset: 2px; }
    h2 { margin: 0 0 4px; font-size: 18px; }
    .summary { color: var(--muted); margin: 0 0 10px; font-size: 13px; }
    svg { width: 100%; height: 220px; display: block; }
    .axis { stroke: #9aa6b2; stroke-width: 1; }
    .gridline { stroke: #e8edf2; stroke-width: 1; }
    .series { fill: none; stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }
    .point { stroke: #fff; stroke-width: 2; }
    .threshold { stroke: var(--gold); stroke-width: 2; stroke-dasharray: 5 4; }
    .legend { display: flex; gap: 14px; flex-wrap: wrap; color: var(--muted); font-size: 12px; }
    .key { display: inline-flex; align-items: center; gap: 5px; }
    .swatch { width: 14px; height: 3px; border-radius: 2px; display: inline-block; }
    .table { margin-top: 18px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--line); }
    th, td { text-align: left; border-bottom: 1px solid var(--line); padding: 9px 10px; font-size: 13px; }
    th { color: var(--muted); font-weight: 600; }
    @media (max-width: 820px) {
      header { align-items: start; flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>CF Audit Log 7day Trend</h1>
      <div class="meta">Local static dashboard / Refs #549, #586, #656 / schema_version 1.0.0</div>
    </div>
    <nav class="toolbar" aria-label="metric anchors">
      <a href="#fallback">Fallback</a>
      <a href="#latency">Latency</a>
      <a href="#issues">Issues</a>
      <a href="#leakage">Leakage</a>
    </nav>
  </header>
  <main>
    <div class="grid">
      <section id="fallback" data-metric="fallback_rate" data-title="Fallback rate" data-unit="%"></section>
      <section id="latency" data-metric="p95_latency_ms" data-title="p95 latency" data-unit="ms"></section>
      <section id="issues" data-metric="issues_opened" data-title="Issues opened" data-unit="count"></section>
      <section id="leakage" data-metric="leakage_hits" data-title="Leakage hits" data-unit="count"></section>
    </div>
    <div class="table">
      <table aria-label="weekly values">
        <thead>
          <tr><th>Week</th><th>Period</th><th>Fallback</th><th>p95 latency</th><th>Issues</th><th>Leakage</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>
  <script>
    const trend = {
      schema_version: "1.0.0",
      weeks: [
        { week_starting: "2026-W18", period: "threshold", fallbackRateMean: 0.031, p95LatencyMedianMs: 188, issuesOpenedTotal: 7, leakageHits: 0 },
        { week_starting: "2026-W19", period: "mixed", fallbackRateMean: 0.024, p95LatencyMedianMs: 171, issuesOpenedTotal: 5, leakageHits: 0 },
        { week_starting: "2026-W20", period: "ml", fallbackRateMean: 0.014, p95LatencyMedianMs: 142, issuesOpenedTotal: 3, leakageHits: 0 },
        { week_starting: "2026-W21", period: "ml", fallbackRateMean: 0.011, p95LatencyMedianMs: 131, issuesOpenedTotal: 2, leakageHits: 0 }
      ]
    };
    const metricMap = {
      fallback_rate: { color: "var(--blue)", values: w => w.fallbackRateMean * 100, format: v => `${v.toFixed(1)}%`, baseline: 5 },
      p95_latency_ms: { color: "var(--green)", values: w => w.p95LatencyMedianMs, format: v => `${Math.round(v)} ms`, baseline: 180 },
      issues_opened: { color: "var(--red)", values: w => w.issuesOpenedTotal, format: v => String(v), baseline: 6 },
      leakage_hits: { color: "var(--gold)", values: w => w.leakageHits, format: v => String(v), baseline: 0 }
    };
    function draw(section) {
      const metric = section.dataset.metric;
      const config = metricMap[metric];
      const values = trend.weeks.map(config.values);
      const max = Math.max(config.baseline, ...values, 1);
      const min = Math.min(0, ...values);
      const w = 520, h = 210, p = 34;
      const x = i => p + (i * (w - p * 2)) / Math.max(values.length - 1, 1);
      const y = v => h - p - ((v - min) * (h - p * 2)) / Math.max(max - min, 1);
      const points = values.map((v, i) => `${x(i)},${y(v)}`).join(" ");
      const baselineY = y(config.baseline);
      section.innerHTML = `
        <h2>${section.dataset.title}</h2>
        <p class="summary">${trend.weeks[0].week_starting} to ${trend.weeks.at(-1).week_starting}</p>
        <svg viewBox="0 0 ${w} ${h}" role="img" aria-label="${section.dataset.title} weekly trend">
          <line class="gridline" x1="${p}" x2="${w - p}" y1="${p}" y2="${p}"></line>
          <line class="gridline" x1="${p}" x2="${w - p}" y1="${h / 2}" y2="${h / 2}"></line>
          <line class="axis" x1="${p}" x2="${p}" y1="${p}" y2="${h - p}"></line>
          <line class="axis" x1="${p}" x2="${w - p}" y1="${h - p}" y2="${h - p}"></line>
          <line class="threshold" x1="${p}" x2="${w - p}" y1="${baselineY}" y2="${baselineY}"></line>
          <polyline class="series" points="${points}" style="stroke:${config.color}"></polyline>
          ${values.map((v, i) => `<circle class="point" cx="${x(i)}" cy="${y(v)}" r="5" style="fill:${config.color}"><title>${trend.weeks[i].week_starting}: ${config.format(v)}</title></circle>`).join("")}
          ${trend.weeks.map((week, i) => `<text x="${x(i)}" y="${h - 9}" text-anchor="middle" font-size="11" fill="#627080">${week.week_starting.replace("2026-","")}</text>`).join("")}
        </svg>
        <div class="legend">
          <span class="key"><span class="swatch" style="background:${config.color}"></span>weekly value</span>
          <span class="key"><span class="swatch" style="background:var(--gold)"></span>threshold baseline</span>
        </div>`;
    }
    document.querySelectorAll("section[data-metric]").forEach(draw);
    document.getElementById("rows").innerHTML = trend.weeks.map(w => `
      <tr>
        <td>${w.week_starting}</td><td>${w.period}</td>
        <td>${metricMap.fallback_rate.format(w.fallbackRateMean * 100)}</td>
        <td>${metricMap.p95_latency_ms.format(w.p95LatencyMedianMs)}</td>
        <td>${w.issuesOpenedTotal}</td><td>${w.leakageHits}</td>
      </tr>`).join("");
  </script>
</body>
</html>
