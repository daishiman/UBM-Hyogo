name = "ubm-hyogo-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# top-level [vars] is intentionally absent. Wrangler does not inherit
# top-level vars into named environments, so production/staging vars live only
# under [env.production.vars] and [env.staging.vars].

# 03a: schema sync は 03:00 JST (= 18:00 UTC) に 1 回
# 03b: response sync は */15 で実行（forms.responses.list 差分同期）
# issue-377: tag queue retry tick は */5 で実行（legacy Sheets hourly は production と同じく手動限定）
[triggers]
crons = ["0 18 * * *", "*/15 * * * *", "*/5 * * * *"]

# D1 データベースバインディング
# UT-09 同期ジョブが SQLITE_BUSY retry/backoff・write queue 直列化・短い transaction
# ・batch-size 100 上限 で書き込みする前提で運用する (apps/api/src/jobs/sync-sheets-to-d1.ts)
[[d1_databases]]
binding = "DB"
database_name = "ubm-hyogo-db-prod"
database_id = "24963f0a-7fbb-4508-a93a-f8e502aa4585"
migrations_dir = "migrations"

# 03b-followup-006: per-sync write cap 連続到達検知用 Analytics Engine dataset
# Issue #199 / response_sync の 200 cap が 3 連続で hit したとき
# `sync_write_cap_consecutive_hit` を emit する。free tier 25M write/month。
[[analytics_engine_datasets]]
binding = "SYNC_ALERTS"
dataset = "sync_alerts"

# UT-07B-FU-01: schema alias back-fill queue/cron split
# alias 確定（Stage 1）と back-fill 継続（Stage 2）の責務分離。
# Cloudflare Queues は Workers Paid プラン必須のため、Free plan 運用中は binding を無効化する。
# コード側 (apps/api/src/index.ts:344, env.ts:30) は optional binding として graceful degradation 済み。
# Workers Paid に切り替える際は以下 3 箇所（default / env.production / env.staging）を有効化する。
# [[queues.producers]]
# binding = "SCHEMA_ALIAS_BACKFILL_QUEUE"
# queue = "schema-alias-backfill"
#
# [[queues.consumers]]
# queue = "schema-alias-backfill"
# max_batch_size = 1
# max_batch_timeout = 5
# max_retries = 3
# dead_letter_queue = "schema-alias-backfill-dlq"

[env.production]
name = "ubm-hyogo-api"

[env.production.vars]
ENVIRONMENT = "production"
MAIL_FROM_ADDRESS = "noreply@ubm-hyogo.example"
AUTH_URL = "https://api.ubm-hyogo.workers.dev"
SHEET_ID = "10XQqUko2A5jFXT-J0ibvPt3KUX56divqEk6kDccH5vw"
FORM_ID = "119ec539YYGmkUEnSYlhI-zMXtvljVpvDFMm7nfhp7Xg"
GOOGLE_FORM_ID = "119ec539YYGmkUEnSYlhI-zMXtvljVpvDFMm7nfhp7Xg"
SHEETS_SPREADSHEET_ID = "10XQqUko2A5jFXT-J0ibvPt3KUX56divqEk6kDccH5vw"
SYNC_BATCH_SIZE = "100"
SYNC_MAX_RETRIES = "3"
SYNC_RANGE = "Form Responses 1!A1:ZZ10000"
RETENTION_PURGE_MODE = "dry-run"
TAG_QUEUE_PAUSED = "false"

# Issue #553 — live audit-correlation endpoint (vars only; secrets are CLI-injected)
# AUDIT_CORRELATION_RUNBOOK_BASE_URL: 公開 runbook URL (#anchor を notify-slack で付与)
# AUDIT_CORRELATION_GITHUB_ORG: live fetch する GitHub Org slug
# Secrets (PAT / Slack webhook / salt / internal token) は `bash scripts/cf.sh secret put --env production <NAME>` で投入する
AUDIT_CORRELATION_RUNBOOK_BASE_URL = "https://github.com/daishiman/UBM-Hyogo/blob/main/docs/runbooks/audit-correlation.md"
AUDIT_CORRELATION_GITHUB_ORG = "daishiman"

# 09b-A production smoke uses Cloudflare Secrets, not vars:
# SENTRY_DSN_API / SLACK_WEBHOOK_INCIDENT / SMOKE_ADMIN_TOKEN.
# Provision with `bash scripts/cf.sh secret put --env production <NAME>`.

# production は Cloudflare free plan の account cron 上限を避けるため 3 本以内に絞る。
# - 03a schema sync: 03:00 JST (= 18:00 UTC)
# - 03b Forms response sync: 15 分ごと
# - issue-377 tag queue retry tick: 5 分ごと
# legacy Sheets hourly sync (`0 * * * *`) は response sync 完了後の互換経路として手動実行に限定する。
[env.production.triggers]
crons = ["0 18 * * *", "*/15 * * * *", "*/5 * * * *"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "ubm-hyogo-db-prod"
database_id = "24963f0a-7fbb-4508-a93a-f8e502aa4585"
migrations_dir = "migrations"

# 03b-followup-006: production 用 Analytics Engine dataset
[[env.production.analytics_engine_datasets]]
binding = "SYNC_ALERTS"
dataset = "sync_alerts"

# UT-07B-FU-01: production 用 Queue binding（drift 防止のため staging と同 queue 名）
# Free plan 運用中のため binding を無効化（Workers Paid 切替時に有効化）
# [[env.production.queues.producers]]
# binding = "SCHEMA_ALIAS_BACKFILL_QUEUE"
# queue = "schema-alias-backfill"
#
# [[env.production.queues.consumers]]
# queue = "schema-alias-backfill"
# max_batch_size = 1
# max_batch_timeout = 5
# max_retries = 3
# dead_letter_queue = "schema-alias-backfill-dlq"

# Issue #514: Cloudflare Audit Logs cold storage / R2 export
# 30 日 TTL purge 前に redacted JSONL.gz を R2 へ定期 export する cold storage。
# bucket 作成 / token 発行は Phase 11 runtime gate (G1-G2) 承認後に実行する。
[[env.production.r2_buckets]]
binding = "UBM_AUDIT_COLD_STORAGE"
bucket_name = "ubm-hyogo-audit-cold-storage-prod"

[env.staging]
name = "ubm-hyogo-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
MAIL_FROM_ADDRESS = "noreply@staging.ubm-hyogo.example"
AUTH_URL = "https://api-staging.ubm-hyogo.workers.dev"
SHEET_ID = "10XQqUko2A5jFXT-J0ibvPt3KUX56divqEk6kDccH5vw"
FORM_ID = "119ec539YYGmkUEnSYlhI-zMXtvljVpvDFMm7nfhp7Xg"
GOOGLE_FORM_ID = "119ec539YYGmkUEnSYlhI-zMXtvljVpvDFMm7nfhp7Xg"
SHEETS_SPREADSHEET_ID = "10XQqUko2A5jFXT-J0ibvPt3KUX56divqEk6kDccH5vw"
SYNC_BATCH_SIZE = "100"
SYNC_MAX_RETRIES = "3"
SYNC_RANGE = "Form Responses 1!A1:ZZ10000"
RETENTION_PURGE_MODE = "dry-run"
TAG_QUEUE_PAUSED = "false"

# Issue #553 — live audit-correlation endpoint (vars only; secrets are CLI-injected)
AUDIT_CORRELATION_RUNBOOK_BASE_URL = "https://github.com/daishiman/UBM-Hyogo/blob/main/docs/runbooks/audit-correlation.md"
AUDIT_CORRELATION_GITHUB_ORG = "daishiman"

# 09b-A staging smoke uses the same secret names as production with env-scoped values:
# SENTRY_DSN_API / SLACK_WEBHOOK_INCIDENT / SMOKE_ADMIN_TOKEN.

# staging は production と同じ 3 本上限に合わせる。legacy Sheets hourly sync は手動限定。
[env.staging.triggers]
crons = ["0 18 * * *", "*/15 * * * *", "*/5 * * * *"]

# staging D1 バインディング (WAL 競合ポリシーは production と同じ)
[[env.staging.d1_databases]]
binding = "DB"
database_name = "ubm-hyogo-db-staging"
database_id = "990e5d6c-51eb-4826-9c13-c0ae007d5f46"
migrations_dir = "migrations"

# 03b-followup-006: staging 用 Analytics Engine dataset
[[env.staging.analytics_engine_datasets]]
binding = "SYNC_ALERTS"
dataset = "sync_alerts_staging"

# UT-07B-FU-01: staging 用 Queue binding（production と同 queue 名で同期）
# Free plan 運用中のため binding を無効化（Workers Paid 切替時に有効化）
# [[env.staging.queues.producers]]
# binding = "SCHEMA_ALIAS_BACKFILL_QUEUE"
# queue = "schema-alias-backfill-staging"
#
# [[env.staging.queues.consumers]]
# queue = "schema-alias-backfill-staging"
# max_batch_size = 1
# max_batch_timeout = 5
# max_retries = 3
# dead_letter_queue = "schema-alias-backfill-staging-dlq"

# Issue #514: staging（spec の preview 相当）の cold storage R2 binding
# bucket 作成は Phase 11 runtime gate 承認後。
[[env.staging.r2_buckets]]
binding = "UBM_AUDIT_COLD_STORAGE"
bucket_name = "ubm-hyogo-audit-cold-storage-staging"
preview_bucket_name = "ubm-hyogo-audit-cold-storage-staging"
