name = "ubm-hyogo-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
SHEET_ID = "10XQqUko2A5jFXT-J0ibvPt3KUX56divqEk6kDccH5vw"
FORM_ID = "119ec539YYGmkUEnSYlhI-zMXtvljVpvDFMm7nfhp7Xg"
GOOGLE_FORM_ID = "119ec539YYGmkUEnSYlhI-zMXtvljVpvDFMm7nfhp7Xg"
SHEETS_SPREADSHEET_ID = "10XQqUko2A5jFXT-J0ibvPt3KUX56divqEk6kDccH5vw"
SYNC_BATCH_SIZE = "100"
SYNC_MAX_RETRIES = "3"
SYNC_RANGE = "Form Responses 1!A1:ZZ10000"

# u-04: production cron は毎時 0 分に sheets→D1 全件 upsert sync を実行（旧 6 時間→1 時間に短縮）
# 03a: schema sync は 03:00 JST (= 18:00 UTC) に 1 回
# 03b: response sync は */15 で実行（forms.responses.list 差分同期）
[triggers]
crons = ["0 * * * *", "0 18 * * *", "*/15 * * * *"]

# D1 データベースバインディング
# UT-09 同期ジョブが SQLITE_BUSY retry/backoff・write queue 直列化・短い transaction
# ・batch-size 100 上限 で書き込みする前提で運用する (apps/api/src/jobs/sync-sheets-to-d1.ts)
[[d1_databases]]
binding = "DB"
database_name = "ubm-hyogo-db-prod"
database_id = "24963f0a-7fbb-4508-a93a-f8e502aa4585"
migrations_dir = "migrations"

# 03b-followup-006: per-sync write cap 連続到達検知用 Analytics Engine dataset
# Issue #199 / response_sync の 200 cap が 3 連続で hit したとき
# `sync_write_cap_consecutive_hit` を emit する。free tier 25M write/month。
[[analytics_engine_datasets]]
binding = "SYNC_ALERTS"
dataset = "sync_alerts"

[env.production]
name = "ubm-hyogo-api"

[env.production.vars]
ENVIRONMENT = "production"
MAIL_FROM_ADDRESS = "noreply@ubm-hyogo.example"
AUTH_URL = "https://api.ubm-hyogo.workers.dev"
SHEET_ID = "10XQqUko2A5jFXT-J0ibvPt3KUX56divqEk6kDccH5vw"
FORM_ID = "119ec539YYGmkUEnSYlhI-zMXtvljVpvDFMm7nfhp7Xg"
GOOGLE_FORM_ID = "119ec539YYGmkUEnSYlhI-zMXtvljVpvDFMm7nfhp7Xg"
SHEETS_SPREADSHEET_ID = "10XQqUko2A5jFXT-J0ibvPt3KUX56divqEk6kDccH5vw"
SYNC_BATCH_SIZE = "100"
SYNC_MAX_RETRIES = "3"
SYNC_RANGE = "Form Responses 1!A1:ZZ10000"

# production は Cloudflare free plan の account cron 上限を避けるため 2 本に絞る。
# - 03a schema sync: 03:00 JST (= 18:00 UTC)
# - 03b Forms response sync: 15 分ごと
# legacy Sheets hourly sync (`0 * * * *`) は response sync 完了後の互換経路として手動実行に限定する。
[env.production.triggers]
crons = ["0 18 * * *", "*/15 * * * *"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "ubm-hyogo-db-prod"
database_id = "24963f0a-7fbb-4508-a93a-f8e502aa4585"
migrations_dir = "migrations"

# 03b-followup-006: production 用 Analytics Engine dataset
[[env.production.analytics_engine_datasets]]
binding = "SYNC_ALERTS"
dataset = "sync_alerts"

[env.staging]
name = "ubm-hyogo-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
MAIL_FROM_ADDRESS = "noreply@staging.ubm-hyogo.example"
AUTH_URL = "https://api-staging.ubm-hyogo.workers.dev"
SHEET_ID = "10XQqUko2A5jFXT-J0ibvPt3KUX56divqEk6kDccH5vw"
FORM_ID = "119ec539YYGmkUEnSYlhI-zMXtvljVpvDFMm7nfhp7Xg"
GOOGLE_FORM_ID = "119ec539YYGmkUEnSYlhI-zMXtvljVpvDFMm7nfhp7Xg"
SHEETS_SPREADSHEET_ID = "10XQqUko2A5jFXT-J0ibvPt3KUX56divqEk6kDccH5vw"
SYNC_BATCH_SIZE = "100"
SYNC_MAX_RETRIES = "3"
SYNC_RANGE = "Form Responses 1!A1:ZZ10000"

# UT-09: staging (=dev 想定) は 1 時間ごとの Sheets 全件 upsert sync + 03a schema sync (03:00 JST = 18:00 UTC) + 03b response sync */15
[env.staging.triggers]
crons = ["0 * * * *", "0 18 * * *", "*/15 * * * *"]

# staging D1 バインディング (WAL 競合ポリシーは production と同じ)
[[env.staging.d1_databases]]
binding = "DB"
database_name = "ubm-hyogo-db-staging"
database_id = "990e5d6c-51eb-4826-9c13-c0ae007d5f46"
migrations_dir = "migrations"

# 03b-followup-006: staging 用 Analytics Engine dataset
[[env.staging.analytics_engine_datasets]]
binding = "SYNC_ALERTS"
dataset = "sync_alerts_staging"
