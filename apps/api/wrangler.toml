name = "ubm-hyogo-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
SHEET_ID = "10XQqUko2A5jFXT-J0ibvPt3KUX56divqEk6kDccH5vw"
FORM_ID = "119ec539YYGmkUEnSYlhI-zMXtvljVpvDFMm7nfhp7Xg"

# D1 データベースバインディング
# D1 の書き込み/読み取り競合ポリシー:
# Cloudflare D1 が PRAGMA journal_mode=WAL の永続化を公式サポートしているか
# 確認してから適用すること（docs/ut-02-d1-wal-mode/ 参照）。
# SQLITE_BUSY 発生時のランタイム緩和策（retry/backoff、キュー直列化）は
# UT-09 (Sheets→D1 同期ジョブ実装) で実施する。
[[d1_databases]]
binding = "DB"
database_name = "ubm-hyogo-db-prod"
database_id = "24963f0a-7fbb-4508-a93a-f8e502aa4585"
migrations_dir = "migrations"

[env.staging]
name = "ubm-hyogo-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
SHEET_ID = "10XQqUko2A5jFXT-J0ibvPt3KUX56divqEk6kDccH5vw"
FORM_ID = "119ec539YYGmkUEnSYlhI-zMXtvljVpvDFMm7nfhp7Xg"

# staging D1 バインディング（WAL 競合ポリシーは production と同じ）
[[env.staging.d1_databases]]
binding = "DB"
database_name = "ubm-hyogo-db-staging"
database_id = "990e5d6c-51eb-4826-9c13-c0ae007d5f46"
migrations_dir = "migrations"
