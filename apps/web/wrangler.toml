name = "ubm-hyogo-web"
main = ".open-next/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
not_found_handling = "single-page-application"

[observability]
enabled = true

[vars]
ENVIRONMENT = "production"

[env.staging]
name = "ubm-hyogo-web-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
PUBLIC_API_BASE_URL = "https://ubm-hyogo-api-staging.daishimanju.workers.dev"
INTERNAL_API_BASE_URL = "https://ubm-hyogo-api-staging.daishimanju.workers.dev"

[[env.staging.services]]
binding = "API_SERVICE"
service = "ubm-hyogo-api-staging"

[env.staging.assets]
directory = ".open-next/assets"
binding = "ASSETS"
not_found_handling = "single-page-application"

[env.staging.observability]
enabled = true

[env.production]
name = "ubm-hyogo-web-production"

[env.production.vars]
ENVIRONMENT = "production"
PUBLIC_API_BASE_URL = "https://ubm-hyogo-api.daishimanju.workers.dev"
INTERNAL_API_BASE_URL = "https://ubm-hyogo-api.daishimanju.workers.dev"

[[env.production.services]]
binding = "API_SERVICE"
service = "ubm-hyogo-api"

[env.production.assets]
directory = ".open-next/assets"
binding = "ASSETS"
not_found_handling = "single-page-application"

[env.production.observability]
enabled = true
