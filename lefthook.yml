# lefthook.yml — Git hook 統一設定（UBM 兵庫支部会）
# Docs: https://lefthook.dev/configuration/
# 設計正本: docs/30-workflows/task-git-hooks-lefthook-and-post-merge/outputs/phase-2/design.md

min_version: 1.6.0
no_tty: false
colors: true

output:
  - meta
  - summary
  - failure

pre-commit:
  parallel: true
  commands:
    main-branch-guard:
      run: bash scripts/hooks/main-branch-guard.sh
      stage_fixed: false
      fail_text: |
        🚫 main / dev ブランチへの直接コミットは禁止されています。
        feature ブランチに切り替えてから commit してください。
    staged-task-dir-guard:
      run: bash scripts/hooks/staged-task-dir-guard.sh
      stage_fixed: false
      fail_text: |
        🚫 ブランチと無関係なタスクディレクトリが含まれています。
        意図的に含める場合: git commit --no-verify
        除外する場合:       git restore --staged <path>
    block-test-suffix:
      run: bash scripts/hooks/block-test-suffix.sh
      stage_fixed: false
      fail_text: |
        🚫 *.test.{ts,tsx} ファイルは追加禁止です（ADR: *.spec.{ts,tsx} に統一）。
        末尾を .spec.ts(x) に rename してから再 stage してください。
    block-stable-key-update:
      run: node scripts/lint-stable-key-update.mjs --strict
      stage_fixed: false
      fail_text: |
        direct schema_questions.stable_key mutation is forbidden.
        Use schema_aliases / POST /admin/schema/aliases instead.

post-merge:
  parallel: false
  commands:
    stale-worktree-notice:
      run: bash scripts/hooks/stale-worktree-notice.sh post-merge
      # ⚠ post-merge では indexes/*.json の再生成を行わない
      # 再生成は明示コマンド `pnpm indexes:rebuild` でのみ実行する

pre-push:
  parallel: false
  commands:
    verify-esbuild:
      tags: [test, env]
      run: bash scripts/hooks/verify-esbuild-guard.sh
      skip:
        - merge
        - rebase
      fail_text: |
        🚫 esbuild runtime 検証に失敗しました。
        詳細: docs/30-workflows/issue-747-vitest-esbuild-arch-and-worktree-isolation/runbook.md
        復旧: pnpm install --force / pnpm rebuild esbuild / worktree node_modules 再生成
    coverage-guard:
      run: bash scripts/coverage-guard.sh --changed
      stage_fixed: false
    indexes-drift-guard:
      run: bash scripts/hooks/indexes-drift-guard.sh
      stage_fixed: false
      fail_text: |
        🚫 skill indexes に drift があります。
        pnpm indexes:rebuild → 差分を commit → 再 push してください。
        対応 CI: verify-indexes-up-to-date
    gate-metadata-guard:
      run: bash scripts/hooks/gate-metadata-guard.sh
      stage_fixed: false
      fail_text: |
        🚫 変更された artifacts.json に metadata.gates が欠落しています。
        対応 CI: verify-gate-metadata
    phase12-compliance-guard:
      run: bash scripts/hooks/phase12-compliance-guard.sh
      stage_fixed: false
      fail_text: |
        🚫 Phase 12 compliance check に失敗（canonical 9 heading 欠落 等）。
        対応 CI: verify-phase12-compliance
        SSOT: .claude/skills/task-specification-creator/references/phase12-compliance-check-template.md
