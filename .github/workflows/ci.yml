# 目的: typecheck + lint パイプライン（ci / ci）
# 前提: package.json / pnpm-workspace.yaml が両方存在すること
# 有効化タイミング: monorepo 初期化（Phase 02）完了後に自動有効化
# スキップ時: exit 0 で通過（ブランチ保護は形式上 pass）
name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check implementation readiness
        id: ready
        run: |
          if [ -f "package.json" ] && [ -f "pnpm-workspace.yaml" ]; then
            echo "value=true" >> $GITHUB_OUTPUT
          else
            echo "value=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip — monorepo not yet bootstrapped
        if: steps.ready.outputs.value == 'false'
        run: echo "::notice::package.json / pnpm-workspace.yaml not found — typecheck and lint skipped"

      - uses: pnpm/action-setup@v4
        if: steps.ready.outputs.value == 'true'
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        if: steps.ready.outputs.value == 'true'
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        if: steps.ready.outputs.value == 'true'
        run: pnpm install --frozen-lockfile

      - name: Type check
        if: steps.ready.outputs.value == 'true'
        run: pnpm typecheck

      - name: Lint
        if: steps.ready.outputs.value == 'true'
        run: pnpm lint

  coverage-gate:
    # 仕様: docs/30-workflows/coverage-80-enforcement/outputs/phase-12/implementation-guide.md
    # PR1/3: continue-on-error: true (soft gate / 警告のみ)。PR3/3 で削除して hard gate 化する。
    name: coverage-gate
    runs-on: ubuntu-latest
    needs: [ci]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Check implementation readiness
        id: ready
        run: |
          if [ -f "package.json" ] && [ -f "pnpm-workspace.yaml" ]; then
            echo "value=true" >> $GITHUB_OUTPUT
          else
            echo "value=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip — monorepo not yet bootstrapped
        if: steps.ready.outputs.value == 'false'
        run: echo "::notice::package.json / pnpm-workspace.yaml not found — coverage-gate skipped"

      - uses: pnpm/action-setup@v4
        if: steps.ready.outputs.value == 'true'
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        if: steps.ready.outputs.value == 'true'
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        if: steps.ready.outputs.value == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run coverage-guard
        if: steps.ready.outputs.value == 'true'
        # PR1/3: step レベルの continue-on-error も付与（job 全体を success 化）。PR3/3 で削除して hard gate 化。
        continue-on-error: true
        env:
          CI: 'true'
        run: bash scripts/coverage-guard.sh

      - name: Upload coverage report
        if: always() && steps.ready.outputs.value == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            apps/*/coverage/
            packages/*/coverage/
            packages/integrations/*/coverage/
          if-no-files-found: ignore
