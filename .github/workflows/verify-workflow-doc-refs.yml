name: verify-workflow-doc-refs

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "docs/**/*.md"
      - "scripts/ci/verify-workflow-doc-refs.sh"
      - "scripts/ci/__tests__/verify-workflow-doc-refs.spec.sh"
  push:
    branches: [dev, main]
    paths:
      - ".github/workflows/**"
      - "docs/**/*.md"
      - "scripts/ci/verify-workflow-doc-refs.sh"
      - "scripts/ci/__tests__/verify-workflow-doc-refs.spec.sh"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: verify workflow doc refs
        run: bash scripts/ci/verify-workflow-doc-refs.sh
      - name: test workflow doc refs verifier
        run: bash scripts/ci/__tests__/verify-workflow-doc-refs.spec.sh
