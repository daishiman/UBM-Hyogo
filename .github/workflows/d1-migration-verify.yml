name: D1 Migration Verify

on:
  pull_request:
    paths:
      - "apps/api/migrations/**"
      - "scripts/d1/**"
      - "scripts/cf.sh"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  d1-migration-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run script tests
        run: bats scripts/d1/__tests__/*.bats

      - name: Post migration guideline reminder comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- d1-migration-guideline-bot -->';
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const touchesMigration = files.some((file) => file.filename.startsWith('apps/api/migrations/'));
            if (!touchesMigration) {
              core.info('No apps/api/migrations/** changes; skipping D1 migration guideline comment.');
              return;
            }
            const body = `${marker}\n**D1 migration guideline**: このPRは \`apps/api/migrations/**\` を変更しています。\n\n[D1 Migration Test Guideline](https://github.com/${{ github.repository }}/blob/${{ github.event.pull_request.head.sha }}/docs/30-workflows/runbooks/d1-migration-test-guideline.md) の最低基準 3 項目を確認してください。`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
