name: D1 Migration Verify

on:
  pull_request:
    paths:
      - "apps/api/migrations/**"
      - "scripts/d1/**"
      - "scripts/cf.sh"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  d1-migration-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run script tests
        run: bats scripts/d1/__tests__/*.bats

      - name: Check staging D1 availability
        id: staging_db
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CF_SH_SKIP_WITH_ENV: "1"
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "staging token not configured; skipping staging dry-run" >&2
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if bash scripts/cf.sh d1 list 2>/dev/null | grep -F "ubm-hyogo-db-staging" >/dev/null; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "ubm-hyogo-db-staging not found in this account; skipping staging dry-run" >&2
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Staging dry-run
        if: steps.staging_db.outputs.available == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CF_SH_SKIP_WITH_ENV: "1"
          DRY_RUN: "1"
        run: |
          bash scripts/d1/apply-prod.sh ubm-hyogo-db-staging --env staging --migration 0008_schema_alias_hardening
