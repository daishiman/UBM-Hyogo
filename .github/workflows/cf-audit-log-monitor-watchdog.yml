name: cf-audit-log-monitor-watchdog

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: cf-audit-log-monitor-watchdog
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Verify last success heartbeat within 2h
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LAST=$(gh api repos/${{ github.repository }}/actions/variables/CF_AUDIT_LAST_SUCCESS_AT -q .value 2>/dev/null || echo 0)
          NOW=$(date -u +%s)
          DIFF=$((NOW - LAST))
          echo "last_success=$LAST now=$NOW diff_sec=$DIFF"
          if [ "$DIFF" -gt 7200 ]; then
            BODY=$(printf 'Last success heartbeat: %s\nDiff: %ss (threshold 7200).\nWorkflow: cf-audit-log-monitor\n' "$LAST" "$DIFF")
            gh issue create \
              --title "[CF-AUDIT][WATCHDOG] cf-audit-log-monitor stale ${DIFF}s" \
              --body "$BODY" \
              --label "priority:high" \
              --label "type:reliability" \
              --label "cf-audit" \
              --label "bot:cf-audit-log-watchdog"
          fi
