name: cloudflare-alerts-drift
# UT-17-Followup-004: Cloudflare Notification Policy IaC drift 検知
#
# 用途:
#   - 月次 (毎月 1 日 00:00 UTC) で Cloudflare 上の Notification Policy を
#     repo の IaC (`infra/cloudflare-alerts/*.json`) と比較し、drift があれば
#     job を fail させる (exit 2)。
#   - PR では Cloudflare secret/API を使わず、manifest / CLI unit tests のみを実行する。
#   - schedule / workflow_dispatch では read-only token と relay URL secret で実 drift diff を実行する。
#
# 不変条件:
#   - 実 drift job は read-only token (CLOUDFLARE_ALERTS_TOKEN_READ) と URL 比較用
#     CLOUDFLARE_ALERT_RELAY_URL のみを使用する。
#   - apply は本ワークフローからは絶対に実行しない (Account.Notifications:Edit
#     scope の token は CI Secret に入れない)。

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "infra/cloudflare-alerts/**"
      - "scripts/cf.sh"
      - "scripts/__tests__/cf-alerts-cli.test.ts"
      - ".github/workflows/cloudflare-alerts-drift.yml"

permissions:
  contents: read

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Validate alert manifests and CLI
        run: pnpm test:alerts

  diff:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ALERTS_TOKEN_READ: ${{ secrets.CLOUDFLARE_ALERTS_TOKEN_READ }}
      CLOUDFLARE_ALERT_RELAY_URL: ${{ secrets.CLOUDFLARE_ALERT_RELAY_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run drift diff (read-only)
        id: drift
        run: |
          set +e
          bash scripts/cf.sh alerts diff --ci --json > drift.json
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat drift.json
          exit $status

      - name: Upload drift artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-alerts-drift-${{ github.run_id }}
          path: drift.json
          if-no-files-found: ignore
