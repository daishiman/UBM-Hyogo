name: Cloudflare Analytics Monthly Export

on:
  schedule:
    # 毎月 1 日 02:00 UTC（前月分の aggregate-only export）
    - cron: "0 2 1 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run（API 1 回叩くが file 書き込み・PR 作成はしない）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cloudflare-analytics-export
  cancel-in-progress: false

env:
  EVIDENCE_DIR: docs/30-workflows/completed-tasks/09c-serial-production-deploy-and-post-release-verification/outputs/phase-11/long-term-evidence

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (main only)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute target month (YYYYMM)
        id: month
        run: |
          # 前月（UTC ベース）を YYYYMM で算出
          target=$(date -u -d "$(date -u +'%Y-%m-01') -1 day" +'%Y%m')
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "branch=analytics-export-$target" >> "$GITHUB_OUTPUT"

      - name: Guard against duplicate export
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.month.outputs.branch }}
          TARGET: ${{ steps.month.outputs.target }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "::error::branch $BRANCH already exists; refusing to double-export"
            exit 1
          fi
          if git ls-files "$EVIDENCE_DIR" | grep -E "analytics-export-${TARGET}[0-9]{2}-[0-9]{4}-UTC\.json$" >/dev/null; then
            echo "::error::an export for $TARGET already exists; refusing to double-export"
            exit 1
          fi

      - name: Fetch Cloudflare Analytics (aggregate-only)
        env:
          CLOUDFLARE_ANALYTICS_API_TOKEN: ${{ secrets.CLOUDFLARE_ANALYTICS_API_TOKEN }}
          CLOUDFLARE_ZONE_TAG: ${{ secrets.CLOUDFLARE_ZONE_TAG }}
          CLOUDFLARE_ACCOUNT_TAG: ${{ secrets.CLOUDFLARE_ACCOUNT_TAG }}
          ANALYTICS_OUTPUT_DIR: ${{ env.EVIDENCE_DIR }}
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '' }}
        run: pnpm analytics:fetch

      - name: Identify newly added export file
        if: inputs.dry_run != 'true'
        id: newfile
        run: |
          set -euo pipefail
          file=$(git ls-files --others --exclude-standard "$EVIDENCE_DIR" | grep -E 'analytics-export-[0-9]{8}-[0-9]{4}-UTC\.json$' | head -n 1 || true)
          if [ -z "$file" ]; then
            echo "::error::no new export file detected"
            exit 1
          fi
          echo "path=$file" >> "$GITHUB_OUTPUT"

      - name: Run redaction check (CI gate)
        if: inputs.dry_run != 'true'
        run: pnpm analytics:redaction-check "${{ steps.newfile.outputs.path }}"

      - name: Stage rotation diffs
        if: inputs.dry_run != 'true'
        run: |
          git add -A "$EVIDENCE_DIR"

      - name: Create PR with new export
        if: inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.month.outputs.branch }}
          base: main
          delete-branch: false
          title: "chore(analytics): monthly export ${{ steps.month.outputs.target }}"
          commit-message: "chore(analytics): monthly export ${{ steps.month.outputs.target }}"
          body: |
            自動生成: Cloudflare Analytics monthly export
            - target month: ${{ steps.month.outputs.target }}
            - aggregate-only metrics（PII 非保存・redaction-check pass 済み）
            - retention rotation 適用済み（active 12 件、超過分は archive/YYYY-MM/）
            - workflow: `.github/workflows/cloudflare-analytics-export.yml`
            - spec: `docs/30-workflows/issue-484-cloudflare-analytics-export-automation/`
