name: verify-env-secrets

on:
  pull_request:
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run preflight gate
        env:
          GH_TOKEN: ${{ secrets.GH_VERIFY_ENV_SECRETS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ci-evidence
          bash scripts/ci/verify-env-secrets.sh --json --event-name "${GITHUB_EVENT_NAME}" > ci-evidence/verify-env-secrets.json
      - name: Test preflight gate
        run: bash scripts/ci/__tests__/verify-env-secrets.spec.sh
      - name: Upload evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-env-secrets-evidence
          path: ci-evidence/verify-env-secrets.json
