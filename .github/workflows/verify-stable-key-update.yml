# Reject direct schema_questions.stable_key mutations.
name: verify-stable-key-update

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: verify-stable-key-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-stable-key-update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Run stable-key-update guard
        run: pnpm lint:stable-key-update:strict
