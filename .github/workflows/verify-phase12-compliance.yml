name: verify-phase12-compliance

on:
  # MVP-PAUSE 2026-05-15: PR trigger を一時停止。
  # 復活方法: 下の pull_request ブロックの行頭 `# ` を全て削除する。
  # 残っている workflow_dispatch / push / schedule は引き続き有効。
  workflow_dispatch:
  # pull_request:
  # branches: [main, dev]
  # paths:
  # - 'docs/30-workflows/**'
  # - '.github/workflows/verify-phase12-compliance.yml'
  # - 'package.json'
  # - 'scripts/verify-phase12-compliance.ts'
  # - 'scripts/lib/phase12-compliance/**'
  # - 'scripts/__tests__/verify-phase12-compliance.spec.ts'
  # - 'scripts/__tests__/fixtures/phase12-compliance/**'
  # - '.claude/skills/task-specification-creator/references/phase12-compliance-check-template.md'
  #
permissions:
  contents: read

concurrency:
  group: verify-phase12-compliance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-phase12-compliance:
    name: verify-phase12-compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify phase-12 compliance
        env:
          COMPLIANCE_BASE_REF: origin/${{ github.base_ref }}
          COMPLIANCE_HEAD_REF: HEAD
        run: |
          git fetch origin ${{ github.base_ref }}
          pnpm test:phase12-compliance
          pnpm verify:phase12-compliance
