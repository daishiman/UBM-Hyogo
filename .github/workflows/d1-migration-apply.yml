name: D1 Migration Apply

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "apps/api/migrations/**"
      - "scripts/d1/**"
      - "scripts/cf.sh"
  workflow_dispatch:
    inputs:
      target:
        description: "Apply target (staging / production)"
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  apply-staging:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'staging' || github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply migrations to staging D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CF_SH_SKIP_WITH_ENV: "1"
          AUTO_CONFIRM: "1"
        run: |
          bash scripts/d1/apply-prod.sh ubm-hyogo-db-staging --env staging

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: d1-evidence-staging-${{ github.run_id }}
          path: .evidence/d1/
          if-no-files-found: ignore
          retention-days: 30

  apply-production:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production' || github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply migrations to production D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CF_SH_SKIP_WITH_ENV: "1"
          AUTO_CONFIRM: "1"
        run: |
          bash scripts/d1/apply-prod.sh ubm-hyogo-db-prod --env production

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: d1-evidence-production-${{ github.run_id }}
          path: .evidence/d1/
          if-no-files-found: ignore
          retention-days: 90
