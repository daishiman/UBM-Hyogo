# apps/web (Next.js via @opennextjs/cloudflare) を Cloudflare Workers にデプロイ
# dev ブランチ → staging Worker, main ブランチ → production Worker
# deploy secret (GitHub Secrets) のみ使用。runtime secret は Cloudflare Secrets 登録済み前提。
name: Web CD

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"

jobs:
  deploy-staging:
    name: Deploy Web (Staging)
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm --filter @ubm-hyogo/web build:cloudflare

      - name: Deploy to Cloudflare Workers (staging)
        run: pnpm --filter @ubm-hyogo/web deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

  deploy-production:
    name: Deploy Web (Production)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: main
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm --filter @ubm-hyogo/web build:cloudflare

      - name: Deploy to Cloudflare Workers (production)
        run: pnpm --filter @ubm-hyogo/web deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
