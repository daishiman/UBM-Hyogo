# 目的: Cloudflare Workers (OpenNext) への dev/main デプロイ
# 範囲: dev -> ubm-hyogo-web-staging, main -> ubm-hyogo-web-production
name: web-cd

on:
  push:
    branches: [dev, main]

concurrency:
  group: web-cd-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    environment:
      name: staging
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Build web app (OpenNext Workers bundle)
        run: mise exec -- pnpm --filter @ubm-hyogo/web build:cloudflare

      # NOTE(issue-762): step-scoped CF deploy secret (see Deploy step env) is the current safe baseline.
      # Keep GitHub OIDC token permission and OIDC exchange out of web-cd until Cloudflare documents
      # supported Workers deploy OIDC in wrangler-action. See docs/30-workflows/issue-762-cf-oidc-staging-proof-prod-cutover/.
      - name: Deploy to Cloudflare Workers (staging)
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is empty. Confirm GitHub Environment 'staging' has CLOUDFLARE_API_TOKEN registered."
            exit 1
          fi
          bash scripts/cf.sh deploy --config apps/web/wrangler.toml --env staging 2>&1 | tee web-cd-staging-deploy.log

      - name: Verify deploy log redaction (staging)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: bash scripts/redaction-check.sh --log web-cd-staging-deploy.log --account-id "$CLOUDFLARE_ACCOUNT_ID"

  deploy-production:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Build web app (OpenNext Workers bundle)
        run: mise exec -- pnpm --filter @ubm-hyogo/web build:cloudflare

      # NOTE(issue-762): step-scoped CF deploy secret (see Deploy step env) is the current safe baseline.
      # Keep GitHub OIDC token permission and OIDC exchange out of web-cd until Cloudflare documents
      # supported Workers deploy OIDC in wrangler-action. See docs/30-workflows/issue-762-cf-oidc-staging-proof-prod-cutover/.
      - name: Deploy to Cloudflare Workers (production)
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is empty. Confirm GitHub Environment 'production' has CLOUDFLARE_API_TOKEN registered."
            exit 1
          fi
          bash scripts/cf.sh deploy --config apps/web/wrangler.toml --env production 2>&1 | tee web-cd-production-deploy.log

      - name: Verify deploy log redaction (production)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: bash scripts/redaction-check.sh --log web-cd-production-deploy.log --account-id "$CLOUDFLARE_ACCOUNT_ID"
