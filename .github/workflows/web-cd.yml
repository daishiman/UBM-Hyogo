# 目的: Cloudflare Workers の dev/main デプロイ
# 範囲: dev -> staging Worker, main -> production Worker
name: web-cd

on:
  push:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: web-cd-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    environment:
      name: staging
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build OpenNext Workers bundle
        run: pnpm --filter @ubm-hyogo/web build:cloudflare

      - name: Deploy web app to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: bash scripts/cf.sh deploy --config apps/web/wrangler.toml --env staging

  deploy-production:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build OpenNext Workers bundle
        run: pnpm --filter @ubm-hyogo/web build:cloudflare

      - name: Deploy web app to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: bash scripts/cf.sh deploy --config apps/web/wrangler.toml --env production
