name: lighthouse-ci

on:
  pull_request:
    branches: [dev]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: lighthouse-ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Next.js production)
        run: pnpm --filter @ubm-hyogo/web build

      - name: Start server (background)
        run: pnpm --filter @ubm-hyogo/web start &

      - name: Wait for server
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:3000 >/dev/null && exit 0
            sleep 1
          done
          echo "Timed out waiting for http://localhost:3000"
          exit 1

      - name: Run Lighthouse CI
        run: pnpm --filter @ubm-hyogo/web exec lhci autorun --config=../../lighthouserc.json

      - name: Upload Lighthouse artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lhci-report-${{ github.sha }}
          path: .lighthouseci/
          retention-days: 7
