# 目的: ビルド検証パイプライン（Validate Build / Validate Build）
# 前提: package.json / pnpm-workspace.yaml が両方存在すること
# 有効化タイミング: monorepo 初期化（Phase 02）完了後に自動有効化
# スキップ時: exit 0 で通過（ブランチ保護は形式上 pass）
name: Validate Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  validate-build:
    name: Validate Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check implementation readiness
        id: ready
        run: |
          if [ -f "package.json" ] && [ -f "pnpm-workspace.yaml" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — monorepo not yet bootstrapped
        if: steps.ready.outputs.value == 'false'
        run: echo "::notice::package.json / pnpm-workspace.yaml not found — build validation skipped"

      - uses: pnpm/action-setup@v4
        if: steps.ready.outputs.value == 'true'
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        if: steps.ready.outputs.value == 'true'
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        if: steps.ready.outputs.value == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.ready.outputs.value == 'true'
        # apps/web の Next.js build は `_not-found` 等の静的ページ生成時に
        # apps/web/src/lib/env.ts の zod schema を評価するため、最低限のビルド時
        # placeholder env を渡す（real value は runtime に Cloudflare bindings で上書き）
        env:
          ENVIRONMENT: local
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8787
          PUBLIC_API_BASE_URL: http://127.0.0.1:8787
          INTERNAL_API_BASE_URL: http://127.0.0.1:8787
          AUTH_URL: http://127.0.0.1:3000
          SENTRY_ENVIRONMENT: local
          SENTRY_TRACES_SAMPLE_RATE: '0'
        run: pnpm build
