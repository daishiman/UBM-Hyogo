name: lint-shell

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'scripts/**/*.sh'
      - 'scripts/lib/ci-shell-prelude.sh'
      - '.github/workflows/lint-shell.yml'

concurrency:
  group: lint-shell-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Ensure shellcheck is installed
        run: |
          if ! command -v shellcheck >/dev/null; then
            sudo apt-get update -y
            sudo apt-get install -y shellcheck
          fi
          shellcheck --version

      - name: Run shellcheck
        run: |
          mapfile -t files < <(git ls-files 'scripts/**/*.sh')
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::notice::no shell files to lint"
            exit 0
          fi
          shellcheck --severity=warning --external-sources "${files[@]}"
