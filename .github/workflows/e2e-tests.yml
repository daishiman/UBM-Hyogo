# Phase 5 scaffold workflow — 実証跡取得タスクで gate 化するまでは手動実行のみ
name: e2e-tests

on:
  workflow_dispatch:

jobs:
  playwright:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @ubm-hyogo/web exec playwright install --with-deps chromium webkit firefox

      - name: Start API (background)
        run: pnpm --filter @ubm-hyogo/api dev &
        env:
          CI: 'true'

      - name: Build web
        run: pnpm --filter @ubm-hyogo/web build

      - name: Run Playwright tests
        run: pnpm --filter @ubm-hyogo/web test:e2e
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: docs/30-workflows/08b-parallel-playwright-e2e-and-ui-acceptance-smoke/outputs/phase-11/evidence/playwright-report
          retention-days: 14

      - name: Upload screenshot evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-evidence
          path: docs/30-workflows/08b-parallel-playwright-e2e-and-ui-acceptance-smoke/outputs/phase-11/evidence/
          retention-days: 14
