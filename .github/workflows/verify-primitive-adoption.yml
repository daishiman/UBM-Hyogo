name: verify-primitive-adoption

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run primitive adoption grep gate
        run: bash scripts/verify-primitive-adoption.sh
