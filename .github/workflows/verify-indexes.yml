# 目的: aiworkflow-requirements skill の indexes drift を CI で検出する authoritative gate
# 監視対象: .claude/skills/aiworkflow-requirements/indexes
# 設計の正本: docs/30-workflows/task-verify-indexes-up-to-date-ci/outputs/phase-12/implementation-guide.md
# 関連 AC: AC-1〜AC-7（index.md 参照）
name: verify-indexes-up-to-date

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: verify-indexes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-indexes-up-to-date:
    name: verify-indexes-up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild indexes
        run: pnpm indexes:rebuild

      - name: Verify indexes are up to date
        run: |
          INDEXES_PATH=".claude/skills/aiworkflow-requirements/indexes"
          # 未追跡ファイルも diff 対象に含めるため intent-to-add でステージ
          git add -N "$INDEXES_PATH"
          if ! git diff --exit-code -- "$INDEXES_PATH"; then
            echo "::error::index drift detected. Run 'pnpm indexes:rebuild' locally and commit the result."
            echo "--- git status --short ---"
            git status --short -- "$INDEXES_PATH"
            echo "--- git diff --name-status ---"
            git diff --name-status -- "$INDEXES_PATH"
            exit 1
          fi
