name: playwright-visual-baseline-update

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'なぜ baseline 更新が必要か（必須）'
        required: true
        type: string
      target:
        description: 'どの baseline を更新するか'
        required: true
        default: 'visual-full'
        type: choice
        options:
          - visual-full
          - visual-smoke
          - both

jobs:
  update-baseline:
    runs-on: ubuntu-latest
    environment: visual-baseline-approval # ← user approval gate
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: ./.github/actions/setup-project
      - name: Install playwright browsers
        run: pnpm --filter @ubm-hyogo/web exec playwright install --with-deps chromium
      - name: Build apps/web
        run: pnpm --filter @ubm-hyogo/web build
      - name: Regenerate visual-full baselines
        if: ${{ inputs.target == 'visual-full' || inputs.target == 'both' }}
        env:
          PLAYWRIGHT_EVIDENCE_TASK: task-18-fu
        run: |
          pnpm --filter @ubm-hyogo/web exec playwright test \
            --project=visual-full-chromium-desktop \
            --project=visual-full-chromium-tablet \
            --project=visual-full-chromium-mobile \
            --update-snapshots
      - name: Regenerate visual-smoke baselines
        if: ${{ inputs.target == 'visual-smoke' || inputs.target == 'both' }}
        env:
          PLAYWRIGHT_EVIDENCE_TASK: task-18-w7
          PLAYWRIGHT_TASK18_SMOKE: '1'
        run: |
          pnpm --filter @ubm-hyogo/web exec playwright test \
            --project=visual-chromium \
            --update-snapshots
      - name: Detect updated baselines
        id: detect
        run: |
          set -eu
          git status --porcelain apps/web/playwright/tests/visual apps/web/playwright/tests/visual-full > /tmp/baseline-status.txt || true
          changed=$(wc -l < /tmp/baseline-status.txt | tr -d ' ')
          echo "changed_count=${changed}" >> "$GITHUB_OUTPUT"
          {
            echo "## Updated baselines (${{ inputs.target }})"
            echo ""
            echo "**Reason:** ${{ inputs.reason }}"
            echo ""
            if [ "$changed" = "0" ]; then
              echo "_No baseline files were changed by --update-snapshots._"
            else
              echo "Changed files (${changed}):"
              echo ""
              echo '```'
              cat /tmp/baseline-status.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Package updated baselines
        if: steps.detect.outputs.changed_count != '0'
        run: |
          set -eu
          mkdir -p /tmp/baseline-bundle
          git status --porcelain apps/web/playwright/tests/visual apps/web/playwright/tests/visual-full \
            | awk '{print $2}' \
            | while read -r f; do
                if [ -f "$f" ]; then
                  mkdir -p "/tmp/baseline-bundle/$(dirname "$f")"
                  cp "$f" "/tmp/baseline-bundle/$f"
                fi
              done
          (cd /tmp/baseline-bundle && tar czf /tmp/baselines.tar.gz .)
      - name: Upload baseline artifact
        if: steps.detect.outputs.changed_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: updated-baselines-${{ inputs.target }}-${{ github.run_id }}
          path: /tmp/baselines.tar.gz
          if-no-files-found: error
          retention-days: 14
