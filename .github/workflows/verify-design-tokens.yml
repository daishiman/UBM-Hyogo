name: verify-design-tokens

on:
  # MVP-PAUSE 2026-05-15: PR trigger を一時停止。
  # 復活方法: 下の pull_request ブロックの行頭 `# ` を全て削除する。
  # 残っている workflow_dispatch / push / schedule は引き続き有効。
  workflow_dispatch:
  # pull_request:
  # branches: [main, dev]
  # paths:
  # - 'apps/web/src/styles/tokens.css'
  # - 'apps/web/src/styles/globals.css'
  # - 'docs/00-getting-started-manual/specs/09b-design-tokens.md'
  # - 'scripts/verify-design-tokens.ts'
  # - 'scripts/verify-design-tokens.spec.ts'
  # - '.github/workflows/verify-design-tokens.yml'
  push:
    branches: [main, dev]

concurrency:
  group: verify-design-tokens-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-design-tokens:
    name: verify-design-tokens
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install deps
        run: mise exec -- pnpm install --frozen-lockfile
      - name: Unit test verifier
        run: mise exec -- pnpm vitest run scripts/verify-design-tokens.spec.ts
      - name: Verify design tokens
        run: mise exec -- pnpm verify:tokens
