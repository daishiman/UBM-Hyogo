name: verify-gate-metadata

on:
  # MVP-PAUSE 2026-05-15: PR trigger を一時停止。
  # 復活方法: 下の pull_request ブロックの行頭 `# ` を全て削除する。
  # 残っている workflow_dispatch / push / schedule は引き続き有効。
  workflow_dispatch:
  # pull_request:
  # paths:
  # - "**/artifacts.json"
  # - "package.json"
  # - "pnpm-lock.yaml"
  # - "packages/shared/package.json"
  # - "packages/shared/src/index.ts"
  # - "packages/shared/src/gate-metadata/**"
  # - "scripts/gate-metadata/**"
  # - ".github/workflows/verify-gate-metadata.yml"
  #
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install actionlint
        id: actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.7
          echo "path=$(pwd)/actionlint" >> "$GITHUB_OUTPUT"

      - name: Lint workflow
        run: ${{ steps.actionlint.outputs.path }} .github/workflows/verify-gate-metadata.yml

      - name: Typecheck shared package
        run: pnpm --filter @ubm-hyogo/shared typecheck

      - name: Run focused gate metadata tests
        run: pnpm --filter @ubm-hyogo/shared test -- gate-metadata

      - name: Run gate-metadata validator
        shell: bash
        run: |
          mapfile -t changed_artifacts < <(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- "**/artifacts.json")
          pnpm gate-metadata:validate --require-gates-for-changed "${changed_artifacts[@]}"
