# 目的: Cloudflare Workers の dev/main デプロイ
# 範囲: dev -> staging, main -> production
name: backend-ci

on:
  push:
    branches: [dev, main]

concurrency:
  group: backend-ci-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    environment:
      name: staging
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations
        id: migrate
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.85.0
          workingDirectory: apps/api
          command: d1 migrations apply ubm-hyogo-db-staging --env staging --remote
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Workers app
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.85.0
          workingDirectory: apps/api
          command: deploy --env staging
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Record post-migration deploy failure
        if: ${{ failure() && steps.migrate.outcome == 'success' && steps.deploy.outcome == 'failure' }}
        run: |
          {
            echo "## Post-migration deploy failure"
            echo
            echo "D1 migrations were applied to staging, but the Workers deploy step failed."
            echo "Do not re-run migrations blindly. Inspect the deploy failure, verify the D1 migration ledger, and re-run the deploy after the root cause is fixed."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations
        id: migrate
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.85.0
          workingDirectory: apps/api
          command: d1 migrations apply ubm-hyogo-db-prod --env production --remote
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Workers app
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.85.0
          workingDirectory: apps/api
          command: deploy --env production
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Record post-migration deploy failure
        if: ${{ failure() && steps.migrate.outcome == 'success' && steps.deploy.outcome == 'failure' }}
        run: |
          {
            echo "## Post-migration deploy failure"
            echo
            echo "D1 migrations were applied to production, but the Workers deploy step failed."
            echo "Do not re-run migrations blindly. Inspect the deploy failure, verify the D1 migration ledger, and re-run the deploy after the root cause is fixed."
          } >> "$GITHUB_STEP_SUMMARY"
