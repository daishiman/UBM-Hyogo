# 目的: Cloudflare Workers の dev/main デプロイ
# 範囲: dev -> staging, main -> production
name: backend-ci

on:
  push:
    branches: [dev, main]

concurrency:
  group: backend-ci-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    environment:
      name: staging
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations
        id: migrate
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.85.0
          workingDirectory: apps/api
          command: d1 migrations apply ubm-hyogo-db-staging --env staging --remote
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Workers app
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.85.0
          workingDirectory: apps/api
          command: deploy --env staging
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        if: ${{ always() && secrets.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MIGRATE_OUTCOME: ${{ steps.migrate.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
          BRANCH_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -u

          if [ "$MIGRATE_OUTCOME" = "success" ] && [ "$DEPLOY_OUTCOME" = "success" ]; then
            title="Backend deploy succeeded"
            color=3066993
            description="Staging migration and deploy finished successfully."
          else
            title="Backend deploy failed"
            color=15158332
            description="Staging migration or deploy failed."
          fi

          payload=$(jq -n \
            --arg title "$title" \
            --arg description "$description" \
            --arg branch "$BRANCH_NAME" \
            --arg sha "${SHA:0:7}" \
            --arg url "$DEPLOY_URL" \
            --arg color "$color" \
            '{embeds:[{title:$title, description:$description, color:($color|tonumber), fields:[{name:"branch", value:$branch, inline:true},{name:"sha", value:$sha, inline:true},{name:"url", value:(if $url == "" then "n/a" else $url end), inline:false}], timestamp:(now|todateiso8601)}]}')

          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK_URL" || true

  deploy-production:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations
        id: migrate
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.85.0
          workingDirectory: apps/api
          command: d1 migrations apply ubm-hyogo-db-prod --env production --remote
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Workers app
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.85.0
          workingDirectory: apps/api
          command: deploy --env production
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        if: ${{ always() && secrets.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MIGRATE_OUTCOME: ${{ steps.migrate.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
          BRANCH_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -u

          if [ "$MIGRATE_OUTCOME" = "success" ] && [ "$DEPLOY_OUTCOME" = "success" ]; then
            title="Backend deploy succeeded"
            color=3066993
            description="Production migration and deploy finished successfully."
          else
            title="Backend deploy failed"
            color=15158332
            description="Production migration or deploy failed."
          fi

          payload=$(jq -n \
            --arg title "$title" \
            --arg description "$description" \
            --arg branch "$BRANCH_NAME" \
            --arg sha "${SHA:0:7}" \
            --arg url "$DEPLOY_URL" \
            --arg color "$color" \
            '{embeds:[{title:$title, description:$description, color:($color|tonumber), fields:[{name:"branch", value:$branch, inline:true},{name:"sha", value:$sha, inline:true},{name:"url", value:(if $url == "" then "n/a" else $url end), inline:false}], timestamp:(now|todateiso8601)}]}')

          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK_URL" || true
